{{/*
# =============================================================================
# 03-connectors-autosoc-cloud.yaml - AutoSOC Cloud Connector + Bridge Service
# =============================================================================
#
# *** EARLY INTEGRATION TESTING ONLY ***
# This resource is deployed for early integration testing of the AutoSOC Cloud
# service connectivity via Skupper. It is NOT production-ready and should be
# reviewed before any production use.
#
# PURPOSE:
#   Exposes the autosoc-cloud service (in scai-dev namespace on scgs-dev) to
#   the Skupper network, allowing connected DP clusters to reach it.
#
# WHAT THIS FILE CREATES:
#
#   1. Connector: scgs-dev--scai-dev--autosoc-cloud
#      - routingKey: scgs-dev--scai-dev--autosoc-cloud
#        (format: {cluster}--{namespace}--{service})
#      - port: 8000 (HTTP)
#      - host: scgs-dev--scai-dev--autosoc-cloud-bridge (via bridge service)
#
#   2. Bridge Service: scgs-dev--scai-dev--autosoc-cloud-bridge (ExternalName)
#      - Bridges from 'customers' namespace to 'scai-dev' namespace
#      - Target: autosoc-cloud.scai-dev.svc.cluster.local
#
# CROSS-NAMESPACE ACCESS:
#   autosoc-cloud is in 'scai-dev' namespace, Skupper Site is in 'customers'.
#   The bridge service (ExternalName) bridges this namespace gap.
#
# TRAFFIC DIRECTION:
#   DP clusters (HTTP client via Listener) → [Skupper tunnel] → scgs-dev (autosoc-cloud via Connector)
#
# VERIFICATION:
#   kubectl get connectors -n {{ .Values.namespace }} | grep autosoc
#   kubectl get svc -n {{ .Values.namespace }} | grep autosoc
#
# =============================================================================
*/}}

{{- if .Values.autosocCloud.enabled }}
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: {{ .Values.autosocCloud.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "skupper.commonLabels" . | nindent 4 }}
    service-type: {{ .Values.autosocCloud.labels.serviceType }}
    managed-by: {{ .Values.autosocCloud.labels.managedBy }}
    purpose: early-integration-testing
  annotations:
    description: >-
      [TESTING] Connector for autosoc-cloud service in scai-dev namespace.
      Routes HTTP traffic (port {{ .Values.autosocCloud.port }}) from DP clusters
      to autosoc-cloud on scgs-dev via Skupper tunnel.
spec:
  routingKey: {{ .Values.autosocCloud.routingKey }}
  host: {{ .Values.autosocCloud.bridgeService.name }}
  port: {{ .Values.autosocCloud.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.autosocCloud.bridgeService.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "skupper.commonLabels" . | nindent 4 }}
    service-type: {{ .Values.autosocCloud.labels.serviceType }}
    managed-by: {{ .Values.autosocCloud.labels.managedBy }}
    bridge-target: {{ .Values.autosocCloud.bridgeService.targetService }}
    purpose: early-integration-testing
  annotations:
    description: >-
      [TESTING] ExternalName bridge from 'customers' namespace to 'scai-dev'
      namespace, enabling Skupper Connector to reach autosoc-cloud service.
spec:
  type: ExternalName
  externalName: {{ .Values.autosocCloud.bridgeService.targetService }}.{{ .Values.autosocCloud.bridgeService.targetNamespace }}.svc.cluster.local
{{- end }}
