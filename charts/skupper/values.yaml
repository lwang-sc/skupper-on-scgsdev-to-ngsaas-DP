controllerImage: quay.io/skupper/controller:2.1.3
kubeAdaptorImage: quay.io/skupper/kube-adaptor:2.1.3
routerImage: quay.io/skupper/skupper-router:3.4.2

# Namespace for the controller. Defaults to the helm release namespace if not set.
controllerNamespace: ""

# available options: cluster, namespace
scope: cluster

# =============================================================================
# Grant Server Configuration
# =============================================================================
# The grant server issues AccessGrant tokens that allow OTHER sites to connect
# TO this cluster.
#
# - Hub site (issues tokens): Set enabled=true
# - Spoke site (connects outbound only): Set enabled=false (default)
#
# When enabled=false (default):
#   - No skupper-grant-server service/LoadBalancer is created
#   - No external exposure required
#   - Site can still connect outbound using AccessToken resources
#
# When enabled=true:
#   - Grant server is started with auto-configuration
#   - Creates skupper-grant-server service (LoadBalancer by default)
#
# See: docs/grant-server-parameters.md for detailed documentation
# =============================================================================
grantServer:
  enabled: true

